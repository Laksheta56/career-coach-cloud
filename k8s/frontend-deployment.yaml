apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: career-coach-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: career-coach-frontend
  template:
    metadata:
      labels:
        app: career-coach-frontend
    spec:
      containers:
      - name: frontend
        image: crcoachacr999.azurecr.io/career-coach-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: career-coach-frontend
